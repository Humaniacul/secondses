name: SecondChance
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.0
targets:
  SecondChance:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: SecondChancee
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.secondchance.app
        PRODUCT_NAME: SecondChance
        INFOPLIST_FILE: SecondChancee/Info.plist
        CODE_SIGN_STYLE: Automatic

  SecondChanceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: SecondChanceTests
    dependencies:
      - target: SecondChance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.secondchance.app.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SecondChance.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SecondChance"
        BUNDLE_LOADER: "$(TEST_HOST)"

  SecondChanceUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: SecondChanceUITests
    dependencies:
      - target: SecondChance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.secondchance.app.uitests
        GENERATE_INFOPLIST_FILE: YES
